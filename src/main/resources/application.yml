spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/user_balance_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  cache:
    type: redis
    redis:
      time-to-live: 600000
  redis:
    host: localhost
    port: 6379

jwt:
  secret: mySecretKeyForJWTTokenThatShouldBeLongEnough123!
  expiration: 86400000