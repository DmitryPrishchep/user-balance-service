databaseChangeLog:
  - changeSet:
      id: 1
      author: staryhroft
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
              - column:
                  name: date_of_birth
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: password
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
        - createTable:
            tableName: account
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    unique: true
                    foreignKeyName: fk_account_user
                    references: users(id)
              - column:
                  name: balance
                  type: DECIMAL(15,2)
                  constraints:
                    nullable: false
              - column:
                  name: initial_balance
                  type: DECIMAL(15,2)
                  constraints:
                    nullable: false
        - createTable:
            tableName: email_data
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_email_data_user
                    references: users(id)
              - column:
                  name: email
                  type: VARCHAR(200)
                  constraints:
                    nullable: false
                    unique: true
        - createTable:
            tableName: phone_data
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_phone_data_user
                    references: users(id)
              - column:
                  name: phone
                  type: VARCHAR(13)
                  constraints:
                    nullable: false
                    unique: true
        - createIndex:
            tableName: users
            indexName: idx_users_name
            columns:
              - column:
                  name: name
        - createIndex:
            tableName: users
            indexName: idx_users_date_of_birth
            columns:
              - column:
                  name: date_of_birth